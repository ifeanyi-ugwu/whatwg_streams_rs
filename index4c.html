<canvas id="my-canvas" width="300" height="300"></canvas>
<br />
<button id="invert-btn">Invert</button>
<button id="grayscale-btn">Grayscale</button>
<button id="brighten-btn">Brighten</button>

<script type="module">
  import init, { run_stream_demo } from "./pkg/local_stream_wasm.js";

  async function main() {
    await init();

    const canvas = document.getElementById("my-canvas");
    const ctx = canvas.getContext("2d");

    // Draw initial red square
    ctx.fillStyle = "red";
    ctx.fillRect(50, 50, 200, 200);

    // Hook up buttons
    document.getElementById("invert-btn").addEventListener("click", () => {
      run_stream_demo("my-canvas", "invert");
    });
    document.getElementById("grayscale-btn").addEventListener("click", () => {
      run_stream_demo("my-canvas", "grayscale");
    });
    document.getElementById("brighten-btn").addEventListener("click", () => {
      run_stream_demo("my-canvas", "brighten");
    });
  }

  main();
</script>
