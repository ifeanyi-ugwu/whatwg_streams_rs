<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Service Worker Streaming Demo</title>
  </head>
  <body>
    <h1>Streaming via Service Worker</h1>

    <div
      id="output"
      style="border: 1px solid #ccc; padding: 10px; min-height: 50px"
    ></div>
    <br />
    <button id="start-btn" disabled>Waiting for Service Worker...</button>
    <div
      id="sw-status"
      style="margin-top: 10px; font-size: 12px; color: #666"
    ></div>

    <script type="module">
      import init, {
        StreamingElementHandle,
      } from "./pkg/service_worker_stream.js";

      async function waitForServiceWorkerReady() {
        return new Promise((resolve) => {
          if (navigator.serviceWorker.controller) {
            resolve();
            return;
          }

          navigator.serviceWorker.addEventListener("controllerchange", () => {
            resolve();
          });
        });
      }

      async function main() {
        await init();

        const startBtn = document.getElementById("start-btn");
        const statusDiv = document.getElementById("sw-status");

        // Register Service Worker
        if ("serviceWorker" in navigator) {
          try {
            const registration = await navigator.serviceWorker.register(
              "./service-worker.js"
            );
            console.log("Service Worker registered");
            statusDiv.textContent =
              "Service Worker registered, waiting for activation...";

            // Wait for service worker to take control
            await waitForServiceWorkerReady();

            startBtn.disabled = false;
            startBtn.textContent = "Start Streaming via Service Worker";
            statusDiv.textContent = "Service Worker ready! ✓";
            statusDiv.style.color = "#28a745";
          } catch (err) {
            console.error("Service Worker failed:", err);
            statusDiv.textContent = "Service Worker failed to register";
            statusDiv.style.color = "#dc3545";
          }
        } else {
          statusDiv.textContent = "Service Workers not supported";
          statusDiv.style.color = "#dc3545";
        }

        startBtn.addEventListener("click", async () => {
          if (!navigator.serviceWorker.controller) {
            alert("Service Worker not ready yet!");
            return;
          }

          const outputEl = document.getElementById("output");
          outputEl.innerHTML = ""; // clear previous chunks
          const streamHandle = new StreamingElementHandle("output"); // new each time

          try {
            const response = await fetch("/streaming-element");
            const reader = response.body.getReader();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              const chunk = new TextDecoder().decode(value);
              console.log("Received chunk:", chunk.trim()); // Debug log
              streamHandle.write_chunk(chunk); // Rust handles DOM write
            }

            streamHandle.close();
          } catch (err) {
            console.error("Streaming failed:", err);
            outputEl.innerHTML = `<div style="color: red;">Error: ${err.message}</div>`;
          }
        });
      }

      main();
    </script>
  </body>
</html>
