<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Streaming Element with Backpressure</title>
  </head>
  <body>
    <h1>Streaming Element with Backpressure</h1>

    <div
      id="output"
      style="border: 1px solid #ccc; padding: 10px; min-height: 50px"
    ></div>
    <br />
    <button id="start-btn">Start Streaming</button>

    <script type="module">
      import init, {
        run_backpressure_demo,
      } from "./pkg/streaming_backpressure_demo.js";

      async function main() {
        await init();

        document.getElementById("start-btn").addEventListener("click", () => {
          run_backpressure_demo("output");
        });
      }

      main();
    </script>
  </body>
</html>
