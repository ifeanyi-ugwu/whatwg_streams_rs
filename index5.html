<canvas id="my-canvas" width="600" height="400"></canvas>
<br />
<button id="invert-btn">Invert Colors</button>

<script type="module">
  import init, { invert_canvas } from "./pkg/local_stream_wasm.js";

  async function main() {
    await init();

    const canvas = document.getElementById("my-canvas");
    const ctx = canvas.getContext("2d");

    // Load image (WhatWG sample: train)
    const img = new Image();
    img.crossOrigin = "anonymous"; // avoid CORS taint
    //img.src = "https://streams.spec.whatwg.org/images/train.jpg";
    img.src =
      "https://images.pexels.com/photos/1793503/pexels-photo-1793503.jpeg?cs=srgb";

    img.onload = () => {
      // Draw image into canvas
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // Enable button once image is ready
      document.getElementById("invert-btn").onclick = () => {
        invert_canvas("my-canvas");
      };
    };
  }

  main();
</script>
