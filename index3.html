<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Streams Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 1rem;
        background: #fafafa;
      }
      #stream-output {
        font-family: monospace;
        padding: 1rem;
        border: 1px solid #ccc;
        background: #111;
        color: #0f0;
        white-space: pre-wrap;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Rust WASM Streams Demo</h1>
    <p>
      Type words below (comma-separated) and watch them stream, transformed to
      uppercase:
    </p>

    <input id="input-words" value="hello,world,from,wasm" />
    <button id="run-btn">Run Stream</button>

    <pre id="stream-output"></pre>

    <script type="module">
      import init, { run_stream_demo } from "./pkg/local_stream_wasm.js";

      async function main() {
        await init();

        document
          .getElementById("run-btn")
          .addEventListener("click", async () => {
            const words = document
              .getElementById("input-words")
              .value.split(",")
              .map((s) => s.trim())
              .filter(Boolean);

            document.getElementById("stream-output").textContent = "";

            await run_stream_demo("stream-output", words);
          });
      }

      main();
    </script>
  </body>
</html>
